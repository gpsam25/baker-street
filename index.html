<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貝克街大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .vintage-border { border: 2px solid #b8860b; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-200 p-4">
    <div class="bg-zinc-900 vintage-border p-8 rounded-xl shadow-2xl max-w-md w-full text-center relative overflow-hidden">

        <div class="absolute top-0 left-0 w-full h-1 bg-yellow-600"></div>

        <h1 class="text-3xl font-bold text-yellow-500 mb-2 tracking-widest">貝克街</h1>
        <h2 class="text-xl text-yellow-700 mb-6 font-bold">謎題大挑戰</h2>

        <!-- 計數器 -->
        <div class="bg-zinc-800 rounded-lg py-3 px-4 mb-8 border border-zinc-700 shadow-inner flex justify-around">
            <div class="text-center">
                <p class="text-xs text-gray-400 mb-1">挑戰人次</p>
                <p class="text-white font-bold text-xl" id="attempt-count">...</p>
            </div>
            <div class="w-px bg-zinc-600"></div>
            <div class="text-center">
                <p class="text-xs text-gray-400 mb-1">成功解謎</p>
                <p class="text-yellow-500 font-bold text-xl" id="correct-count">...</p>
            </div>
        </div>

        <!-- 遊戲區域 -->
        <div id="game-section" class="transition-opacity duration-500">
            <p class="text-xl mb-6 font-bold tracking-wide">最短距離是幾步？</p>
            <div class="flex justify-center items-center gap-3 mb-8">
                <input type="number" id="answer" class="w-24 p-3 text-2xl text-center text-black rounded-lg outline-none focus:ring-4 focus:ring-yellow-600 transition-shadow" placeholder="?">
                <span class="text-xl font-bold">步</span>
            </div>
            <button onclick="submitAnswer()" class="w-full bg-yellow-700 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-lg transition-colors text-lg shadow-lg">
                送出答案
            </button>
            <p class="mt-4 text-sm text-gray-400">※ 提示：每天只有一次回答機會</p>
        </div>

        <!-- 結果區域 -->
        <div id="result-section" class="hidden mt-4 transition-opacity duration-500">
            <p id="result-message" class="text-2xl font-bold mb-4"></p>

            <div id="coupon" class="hidden bg-yellow-50 text-yellow-900 p-6 rounded-lg border-2 border-dashed border-yellow-600 relative">
                <div class="absolute -top-3 -left-3 w-6 h-6 bg-zinc-900 rounded-full"></div>
                <div class="absolute -top-3 -right-3 w-6 h-6 bg-zinc-900 rounded-full"></div>
                <div class="absolute -bottom-3 -left-3 w-6 h-6 bg-zinc-900 rounded-full"></div>
                <div class="absolute -bottom-3 -right-3 w-6 h-6 bg-zinc-900 rounded-full"></div>

                <p class="font-bold text-lg mb-2">🎉 恭喜獲得專屬優惠</p>
                <p class="text-gray-600 mb-2">請截圖保存此畫面</p>
                <div class="bg-yellow-200 py-3 rounded mb-2">
                    <p class="text-2xl font-black text-red-600 tracking-wide">5/11 ~ 5/17</p>
                    <p class="text-xl font-bold">入場九折優惠</p>
                </div>
                <p class="text-sm font-bold mt-3 text-center">結帳請主動向貝克街店員出示</p>
            </div>
        </div>
    </div>

    <script>
        // ★ 部署 Google Apps Script 後，把網址貼在這裡
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzB_bwdQgzuGeWy0AlpC6qodlWU2RUrReKxVEUM1hIym9FoUN9WkE9W30yUClwoyiuQ/exec';

        async function fetchWithTimeout(url, ms = 8000) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(timer);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                clearTimeout(timer);
                throw e;
            }
        }

        async function fetchCounts() {
            try {
                const data = await fetchWithTimeout(`${SCRIPT_URL}?action=get_counts`);
                document.getElementById('attempt-count').innerText = data.attempt ?? '—';
                document.getElementById('correct-count').innerText = data.correct ?? '—';
            } catch (e) {
                document.getElementById('attempt-count').innerText = '—';
                document.getElementById('correct-count').innerText = '—';
            }
        }

        async function incrementCount(isCorrect) {
            try {
                const data = await fetchWithTimeout(`${SCRIPT_URL}?action=increment_attempt`);
                document.getElementById('attempt-count').innerText = data.attempt ?? '—';
            } catch (e) {
                console.error('挑戰人次更新失敗', e);
            }

            if (isCorrect) {
                try {
                    const data = await fetchWithTimeout(`${SCRIPT_URL}?action=increment_correct`);
                    document.getElementById('correct-count').innerText = data.correct ?? '—';
                } catch (e) {
                    console.error('成功解謎更新失敗', e);
                }
            }
        }

        function checkStatus() {
            const lastPlayed = localStorage.getItem('baker_last_played');
            const isCorrect = localStorage.getItem('baker_is_correct');
            const today = new Date().toDateString();

            fetchCounts();

            if (lastPlayed === today) {
                document.getElementById('game-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

                if (isCorrect === 'true') {
                    document.getElementById('result-message').innerText = "您今日已挑戰成功！";
                    document.getElementById('result-message').className = "text-2xl font-bold mb-6 text-green-400";
                    document.getElementById('coupon').classList.remove('hidden');
                } else {
                    document.getElementById('result-message').innerText = "本日回答次數已達上限";
                    document.getElementById('result-message').className = "text-2xl font-bold mb-6 text-red-400";
                }
            }
        }

        function submitAnswer() {
            const answer = document.getElementById('answer').value;
            if (!answer) return;

            const today = new Date().toDateString();

            // 鎖定當天，跨日才能再玩
            localStorage.setItem('baker_last_played', today);

            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            const isAnswerCorrect = (answer === '6');

            incrementCount(isAnswerCorrect);

            if (isAnswerCorrect) {
                localStorage.setItem('baker_is_correct', 'true');
                document.getElementById('result-message').innerText = "恭喜答對！";
                document.getElementById('result-message').className = "text-2xl font-bold mb-4 text-green-400";
                document.getElementById('coupon').classList.remove('hidden');
            } else {
                localStorage.setItem('baker_is_correct', 'false');
                document.getElementById('result-message').innerText = "答錯了，明天再試喔！";
                document.getElementById('result-message').className = "text-2xl font-bold mb-4 text-red-400";
            }
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
